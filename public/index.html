<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0ea5e9 100%);
        color: #f8fafc;
      }

      main {
        text-align: center;
        padding: 3rem 2rem;
        max-width: 32rem;
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.125rem;
        line-height: 1.6;
        color: #cbd5e1;
        margin-bottom: 2rem;
      }

      .badge {
        display: inline-block;
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 0.875rem;
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, World!</h1>
      <p>
        This page is live on DigitalOcean App Platform. Push to your Git
        repository to deploy updates automatically.
      </p>
      <span class="badge">cloud-computing-demo-2026</span>
    </main>
  </body>
</html>
